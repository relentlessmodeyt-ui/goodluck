<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apex Hospitals</title>
  <meta name="description" content="Apex Hospitals — page." />
  <meta name="theme-color" content="#07040f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/clinic.css" />
  <script>document.documentElement.classList.add('js');
    try{if(localStorage.getItem('apex-theme')==='light')document.documentElement.classList.add('theme-light');}catch(e){}</script>
</head>
<body>

  <div class="bg" aria-hidden="true">
    <span class="bg__aurora bg__aurora--1"></span>
    <span class="bg__aurora bg__aurora--2"></span>
    <span class="bg__grain"></span>
  </div>

  <!-- ===== NAV ===== -->
  <header class="nav scrolled" id="nav">
    <div class="nav__in">
      <nav class="nav__links" id="navlinks">
        <a href="index.html" class="nav__home">
          <svg viewBox="0 0 24 24" class="ic"><path d="M4 11l8-7 8 7M6 10v9h12v-9"/></svg>
          Home
        </a>
        <a href="specialities.html">Specialities</a>
        <a href="doctors.html">Find a Doctor</a>
      </nav>
      <a href="index.html" class="brand" aria-label="Apex Hospitals — home">
        <img src="assets/img/apex-mark.png" class="brand__mark" alt="" aria-hidden="true" />
        <img src="assets/img/apex-logo.png" class="brand__logo" alt="Apex Hospitals" />
      </a>
      <div class="nav__right">
        <button class="themebtn" id="themeToggle" type="button" aria-label="Switch between light and dark mode" aria-pressed="false">
          <svg class="ic-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
          <svg class="ic-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8 6 18M18 6l1.8-1.8"/></svg>
        </button>
        <a href="appointment.html" class="btn btn--primary">Book Appointment
          <span class="btn__arrow"><svg viewBox="0 0 24 24"><path d="M7 17L17 7M9 7h8v8"/></svg></span></a>
      </div>
    </div>
  </header>

  <main>
    <section class="section docpage">
      <div class="wrap">
        <nav class="specd__crumb"><a href="index.html">Home</a> &rsaquo; <span id="crumb">Page</span></nav>
        <div class="sec-head">
          <span class="kicker" id="kicker">Apex Hospitals</span>
          <h2 id="pageTitle">Page</h2>
          <p>This page is coming soon. We're putting the content together — in the meantime, explore our specialities, find a doctor, or get in touch.</p>
        </div>
        <div class="specs__cta">
          <a href="index.html" class="btn btn--primary">Back to home
            <span class="btn__arrow"><svg viewBox="0 0 24 24"><path d="M7 17L17 7M9 7h8v8"/></svg></span></a>
        </div>
        <div class="specs__cta" style="margin-top:14px;gap:12px;flex-wrap:wrap">
          <a href="specialities.html" class="btn">All Specialities</a>
          <a href="doctors.html" class="btn">Find a Doctor</a>
          <a href="appointment.html" class="btn">Contact us</a>
        </div>
      </div>
    </section>
  </main>

  <div id="siteFooter" data-base=""></div>

  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var t = (params.get('t') || 'Page').trim().slice(0, 80);
      var titleEl = document.getElementById('pageTitle');
      var crumbEl = document.getElementById('crumb');
      titleEl.textContent = t;          // textContent keeps it safe
      crumbEl.textContent = t;
      document.title = t + ' — Apex Hospitals';
      var yr = document.getElementById('yr');
      if (yr) yr.textContent = new Date().getFullYear();
    })();
  </script>
  <script defer src="assets/js/clinic.js"></script>
  <script defer src="assets/js/footer.js"></script>
  <script defer src="assets/js/theme.js"></script>
</body>
</html>
