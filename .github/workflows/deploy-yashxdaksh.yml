name: Deploy YashxDaksh to GitHub Pages

on:
  push:
    branches: [claude/loving-edison-9nana2]
    paths:
      - "yashxdaksh/**"
      - ".github/workflows/deploy-yashxdaksh.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yashxdaksh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: yashxdaksh/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Disable Jekyll (serve _next assets)
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: yashxdaksh/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
