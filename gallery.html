  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox__close" id="lbClose" type="button" aria-label="Close">&times;</button>
    <img id="lbImg" src="" alt="" />
  </div>

  <div id="siteFooter" data-base=""></div>

  <script>
    (function () {
      var lb = document.getElementById('lightbox'),
          img = document.getElementById('lbImg'),
          closeBtn = document.getElementById('lbClose');
      if (!lb) return;
      function hide() { lb.classList.remove('open'); lb.setAttribute('aria-hidden', 'true'); img.removeAttribute('src'); }
      document.querySelectorAll('.gallery__grid .gphoto').forEach(function (p) {
        p.addEventListener('click', function () {
          img.src = p.currentSrc || p.src;
          img.alt = p.alt || '';
          lb.classList.add('open');
          lb.setAttribute('aria-hidden', 'false');
        });
      });
      lb.addEventListener('click', function (e) { if (e.target === lb || e.target === closeBtn) hide(); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') hide(); });
    })();
  </script>
